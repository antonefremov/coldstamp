name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build & verify
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node (pinned by .nvmrc)
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install (reproducible)
        run: npm ci

      - name: Type-check
        run: npx tsc -b

      - name: Build extension
        run: npm run build

      - name: Reproducible hash of dist/
        id: hash
        run: |
          DIGEST=$(npm run --silent verify)
          echo "dist hash: $DIGEST"
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "## Build digest" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "$DIGEST" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
